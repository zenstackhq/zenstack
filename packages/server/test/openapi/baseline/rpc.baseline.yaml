components:
    schemas:
        StringFilter:
            anyOf:
                - type: string
                - type: object
                  properties:
                      equals:
                          type: string
                      in:
                          type: array
                          items:
                              type: string
                      notIn:
                          type: array
                          items:
                              type: string
                      lt:
                          type: string
                      lte:
                          type: string
                      gt:
                          type: string
                      gte:
                          type: string
                      between:
                          minItems: 2
                          maxItems: 2
                          type: array
                          items:
                              type: string
                      not:
                          $ref: "#/components/schemas/StringFilter"
                      startsWith:
                          type: string
                      endsWith:
                          type: string
                      contains:
                          type: string
                  additionalProperties: false
        DateTime:
            anyOf:
                - type: string
                  format: date-time
                  pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                - {}
        DateTimeFilter:
            anyOf:
                - $ref: "#/components/schemas/DateTime"
                - type: object
                  properties:
                      equals:
                          $ref: "#/components/schemas/DateTime"
                      in:
                          type: array
                          items:
                              $ref: "#/components/schemas/DateTime"
                      notIn:
                          type: array
                          items:
                              $ref: "#/components/schemas/DateTime"
                      lt:
                          $ref: "#/components/schemas/DateTime"
                      lte:
                          $ref: "#/components/schemas/DateTime"
                      gt:
                          $ref: "#/components/schemas/DateTime"
                      gte:
                          $ref: "#/components/schemas/DateTime"
                      between:
                          minItems: 2
                          maxItems: 2
                          type: array
                          items:
                              $ref: "#/components/schemas/DateTime"
                      not:
                          $ref: "#/components/schemas/DateTimeFilter"
                  additionalProperties: false
        JsonValue:
            anyOf:
                - type: string
                - type: number
                - type: boolean
                - {}
                - type: array
                  items:
                      anyOf:
                          - $ref: "#/components/schemas/JsonValue"
                          - type: "null"
                - type: object
                  propertyNames:
                      type: string
                  additionalProperties:
                      anyOf:
                          - $ref: "#/components/schemas/JsonValue"
                          - type: "null"
        JsonFilterOptional:
            type: object
            properties:
                path:
                    type: string
                equals:
                    anyOf:
                        - $ref: "#/components/schemas/JsonValue"
                        - {}
                        - {}
                        - type: "null"
                not:
                    anyOf:
                        - $ref: "#/components/schemas/JsonValue"
                        - {}
                        - {}
                        - type: "null"
                string_contains:
                    type: string
                string_starts_with:
                    type: string
                string_ends_with:
                    type: string
                mode:
                    anyOf:
                        - type: string
                          const: default
                        - type: string
                          const: insensitive
                array_contains:
                    anyOf:
                        - $ref: "#/components/schemas/JsonValue"
                        - {}
                        - {}
                        - type: "null"
                array_starts_with:
                    anyOf:
                        - $ref: "#/components/schemas/JsonValue"
                        - {}
                        - {}
                        - type: "null"
                array_ends_with:
                    anyOf:
                        - $ref: "#/components/schemas/JsonValue"
                        - {}
                        - {}
                        - type: "null"
            additionalProperties: false
        AddressFilterOptional:
            anyOf:
                - type: object
                  properties:
                      city:
                          $ref: "#/components/schemas/StringFilter"
