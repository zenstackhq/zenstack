components:
    schemas:
        _Meta:
            type: object
            properties:
                serialization: {}
        _ErrorResponse:
            type: object
            properties:
                error:
                    type: object
                    properties:
                        message:
                            type: string
        _BatchResponse:
            type: object
            properties:
                data:
                    type: object
                    properties:
                        count:
                            type: integer
                    required:
                        - count
                meta:
                    $ref: "#/components/schemas/_Meta"
        _ExistsResponse:
            type: object
            properties:
                data:
                    type: boolean
                meta:
                    $ref: "#/components/schemas/_Meta"
        _StringFilter:
            oneOf:
                - type: string
                - type: object
                  properties:
                      equals:
                          type: string
                      not:
                          type: string
                      in:
                          type: array
                          items:
                              type: string
                      notIn:
                          type: array
                          items:
                              type: string
                      contains:
                          type: string
                      startsWith:
                          type: string
                      endsWith:
                          type: string
                      mode:
                          type: string
                          enum:
                              - default
                              - insensitive
        _DateTimeFilter:
            oneOf:
                - type: string
                  format: date-time
                - type: object
                  properties:
                      equals:
                          type: string
                          format: date-time
                      not:
                          type: string
                          format: date-time
                      in:
                          type: array
                          items:
                              type: string
                              format: date-time
                      notIn:
                          type: array
                          items:
                              type: string
                              format: date-time
                      lt:
                          type: string
                          format: date-time
                      lte:
                          type: string
                          format: date-time
                      gt:
                          type: string
                          format: date-time
                      gte:
                          type: string
                          format: date-time
        _BooleanFilter:
            oneOf:
                - type: boolean
                - type: object
                  properties:
                      equals:
                          type: boolean
                      not:
                          type: boolean
                      in:
                          type: array
                          items:
                              type: boolean
                      notIn:
                          type: array
                          items:
                              type: boolean
        _IntFilter:
            oneOf:
                - type: integer
                - type: object
                  properties:
                      equals:
                          type: integer
                      not:
                          type: integer
                      in:
                          type: array
                          items:
                              type: integer
                      notIn:
                          type: array
                          items:
                              type: integer
                      lt:
                          type: integer
                      lte:
                          type: integer
                      gt:
                          type: integer
                      gte:
                          type: integer
        User:
            type: object
            properties:
                id:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                email:
                    type: string
                posts:
                    type: array
                    items:
                        $ref: "#/components/schemas/Post"
            required:
                - id
                - createdAt
                - updatedAt
                - email
        UserCreateInput:
            type: object
            properties:
                id:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                email:
                    type: string
            required:
                - updatedAt
                - email
        UserUpdateInput:
            type: object
            properties:
                id:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                email:
                    type: string
        UserWhereUniqueInput:
            type: object
            properties:
                id:
                    type: string
                email:
                    type: string
        UserWhereInput:
            type: object
            properties:
                id:
                    $ref: "#/components/schemas/_StringFilter"
                createdAt:
                    $ref: "#/components/schemas/_DateTimeFilter"
                updatedAt:
                    $ref: "#/components/schemas/_DateTimeFilter"
                email:
                    $ref: "#/components/schemas/_StringFilter"
                AND:
                    oneOf:
                        - $ref: "#/components/schemas/UserWhereInput"
                        - type: array
                          items:
                              $ref: "#/components/schemas/UserWhereInput"
                OR:
                    type: array
                    items:
                        $ref: "#/components/schemas/UserWhereInput"
                NOT:
                    oneOf:
                        - $ref: "#/components/schemas/UserWhereInput"
                        - type: array
                          items:
                              $ref: "#/components/schemas/UserWhereInput"
        UserSelect:
            type: object
            properties:
                id:
                    type: boolean
                createdAt:
                    type: boolean
                updatedAt:
                    type: boolean
                email:
                    type: boolean
                posts:
                    oneOf:
                        - type: boolean
                        - type: object
                          properties:
                              select:
                                  $ref: "#/components/schemas/PostSelect"
                              omit:
                                  $ref: "#/components/schemas/PostOmit"
                              include:
                                  $ref: "#/components/schemas/PostInclude"
        UserInclude:
            type: object
            properties:
                posts:
                    oneOf:
                        - type: boolean
                        - type: object
                          properties:
                              select:
                                  $ref: "#/components/schemas/PostSelect"
                              omit:
                                  $ref: "#/components/schemas/PostOmit"
                              include:
                                  $ref: "#/components/schemas/PostInclude"
        UserOmit:
            type: object
            properties:
                id:
                    type: boolean
                createdAt:
                    type: boolean
                updatedAt:
                    type: boolean
                email:
                    type: boolean
        UserCreateArgs:
            type: object
            properties:
                data:
