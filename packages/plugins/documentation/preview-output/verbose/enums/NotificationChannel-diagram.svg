<line x1="117.39999999999998" y1="281" x2="269.25" y2="281" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="39.99999999999997" y="40" width="120" height="48" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="39.99999999999997" y="40" width="120" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
