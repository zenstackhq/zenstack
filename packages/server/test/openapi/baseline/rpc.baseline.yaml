                - type: object
                  properties:
                      is:
                          $ref: "#/components/schemas/AddressFilterOptional"
                      isNot:
                          $ref: "#/components/schemas/AddressFilterOptional"
                  additionalProperties: false
                - $ref: "#/components/schemas/JsonFilterOptional"
                - type: "null"
                - {}
                - {}
                - {}
        UserWhereUniqueInput:
            type: object
            properties:
                myId:
                    $ref: "#/components/schemas/StringFilter"
