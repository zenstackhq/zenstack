<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 309" width="520" height="309" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, monospace; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="cls-inherit" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto-start-reverse">
    <polygon points="0 0, 12 5, 0 10" fill="var(--bg)" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
  <marker id="cls-composition" markerWidth="12" markerHeight="10" refX="0" refY="5" orient="auto-start-reverse">
    <polygon points="6 0, 12 5, 6 10, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
  <marker id="cls-aggregation" markerWidth="12" markerHeight="10" refX="0" refY="5" orient="auto-start-reverse">
    <polygon points="6 0, 12 5, 6 10, 0 5" fill="var(--bg)" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
  <marker id="cls-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse">
    <polyline points="0 0, 8 3, 0 6" fill="none" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
</defs>
<polyline points="100,88 100,217 189.3,217" fill="none" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#cls-inherit)" />
<polyline points="260,88 260,165" fill="none" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#cls-inherit)" />
<polyline points="420,88 420,217 330.7,217" fill="none" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#cls-inherit)" />
<rect x="189.3" y="165" width="141.39999999999998" height="104" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="189.3" y="165" width="141.39999999999998" height="48" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="260" y="177" text-anchor="middle" dy="0.35em" font-size="10" font-weight="500" font-style="italic" fill="var(--_text-muted)">&lt;&lt;mixin&gt;&gt;</text>
<text x="260" y="195" text-anchor="middle" dy="0.35em" font-size="13" font-weight="700" fill="var(--_text)">SoftDeletable</text>
<line x1="189.3" y1="213" x2="330.7" y2="213" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="197.3" y="227" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-sec)">deletedAt</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">DateTime</tspan></text>
<text x="197.3" y="247" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-sec)">deletedBy</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">String</tspan></text>
<line x1="189.3" y1="261" x2="330.7" y2="261" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="40" y="40" width="120" height="48" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="40" y="40" width="120" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="100" y="56" text-anchor="middle" dy="0.35em" font-size="13" font-weight="700" fill="var(--_text)">Article</text>
<line x1="40" y1="72" x2="160" y2="72" stroke="var(--_node-stroke)" stroke-width="0.75" />
<line x1="40" y1="80" x2="160" y2="80" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="200" y="40" width="120" height="48" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="200" y="40" width="120" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="260" y="56" text-anchor="middle" dy="0.35em" font-size="13" font-weight="700" fill="var(--_text)">Comment</text>
<line x1="200" y1="72" x2="320" y2="72" stroke="var(--_node-stroke)" stroke-width="0.75" />
<line x1="200" y1="80" x2="320" y2="80" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="360" y="40" width="120" height="48" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="360" y="40" width="120" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="420" y="56" text-anchor="middle" dy="0.35em" font-size="13" font-weight="700" fill="var(--_text)">User</text>
<line x1="360" y1="72" x2="480" y2="72" stroke="var(--_node-stroke)" stroke-width="0.75" />
<line x1="360" y1="80" x2="480" y2="80" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="100" y="118.5" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">uses</text>
<text x="260" y="118.5" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">uses</text>
<text x="420" y="118.5" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">uses</text>
</svg>