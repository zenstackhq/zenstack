<rect x="199.99999999999997" y="40" width="173.3" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="286.65" y="56" text-anchor="middle" dy="0.35em" font-size="13" font-weight="700" fill="var(--_text)">NotificationPreference</text>
<line x1="199.99999999999997" y1="72" x2="373.29999999999995" y2="72" stroke="var(--_node-stroke)" stroke-width="0.75" />
<line x1="199.99999999999997" y1="80" x2="373.29999999999995" y2="80" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="99.99999999999997" y="118.5" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">channel</text>
<text x="286.65" y="118.5" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">channel</text>
</svg>